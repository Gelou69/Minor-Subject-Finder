<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubjectFinder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3347;
            --accent: #6c63ff;
            --accent-d: #574fd6;
            --accent-gl: rgba(108, 99, 255, .12);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --orange: #f97316;
            --txt: #e8eaf0;
            --txt2: #8b90a7;
            --txt3: #555b74;
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 16px;
            --r-xl: 22px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 99px
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .fade-up {
            animation: fadeUp .28s ease both
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-size: inherit;
            transition: all .18s;
            border-radius: var(--r-sm);
            font-weight: 600
        }

        input,
        textarea,
        select {
            font-family: inherit;
            font-size: inherit;
            background: var(--surface2);
            color: var(--txt);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 10px 14px;
            outline: none;
            transition: border .18s, box-shadow .18s;
            width: 100%
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-gl)
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--txt3)
        }

        input:disabled,
        textarea:disabled {
            opacity: .45;
            cursor: not-allowed
        }

        select option {
            background: var(--surface2)
        }

        .btn {
            padding: 10px 18px;
            border-radius: var(--r-sm);
            font-weight: 600;
            font-size: 14px
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-d)
        }

        .btn-ghost {
            background: transparent;
            color: var(--txt2);
            border: 1px solid var(--border)
        }

        .btn-ghost:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent)
        }

        .btn-danger {
            background: var(--red);
            color: #fff
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626
        }

        .btn-success {
            background: var(--green);
            color: #fff
        }

        .btn-success:hover:not(:disabled) {
            background: #16a34a
        }

        .btn-warn {
            background: var(--yellow);
            color: #000
        }

        .btn-warn:hover:not(:disabled) {
            background: #d97706
        }

        .btn-orange {
            background: var(--orange);
            color: #fff
        }

        .btn-orange:hover:not(:disabled) {
            background: #ea580c
        }

        .btn-sm {
            padding: 7px 12px;
            font-size: 13px
        }

        .btn-xs {
            padding: 4px 9px;
            font-size: 12px
        }

        button:disabled {
            opacity: .45;
            cursor: not-allowed
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .page {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
            overflow: hidden;
            animation: fadeIn .22s ease
        }

        /* AUTH */
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            background: radial-gradient(ellipse at 65% 35%, rgba(108, 99, 255, .2) 0%, transparent 58%),
                radial-gradient(ellipse at 15% 80%, rgba(99, 179, 255, .1) 0%, transparent 50%), var(--bg)
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, .45)
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 26px
        }

        .auth-logo .icon {
            width: 54px;
            height: 54px;
            background: var(--accent);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 12px
        }

        .auth-logo h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.3px
        }

        .auth-logo p {
            font-size: 13px;
            color: var(--txt2);
            margin-top: 4px
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: var(--r-sm);
            padding: 4px;
            margin-bottom: 14px
        }

        .auth-tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            background: transparent;
            color: var(--txt2);
            border-radius: var(--r-sm)
        }

        .auth-tab.active {
            background: var(--accent);
            color: #fff
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 13px
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .form-field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--txt2)
        }

        .admin-toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 13px;
            background: rgba(245, 158, 11, .08);
            border: 1px solid rgba(245, 158, 11, .25);
            border-radius: var(--r-sm);
            cursor: pointer
        }

        .admin-toggle-row input[type=checkbox] {
            width: auto;
            cursor: pointer
        }

        .admin-toggle-row label {
            font-size: 13px;
            color: var(--yellow);
            font-weight: 600;
            cursor: pointer;
            margin: 0
        }

        /* SHELL */
        .shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden
        }

        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 22px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px
        }

        .topnav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700
        }

        .topnav-brand .dot {
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px
        }

        .topnav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .admin-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 99px;
            background: rgba(245, 158, 11, .18);
            color: var(--yellow);
            border: 1px solid rgba(245, 158, 11, .3);
            letter-spacing: .4px
        }

        .avatar-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            border: 2px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer
        }

        .avatar-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .av {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0
        }

        .av-sm {
            width: 30px;
            height: 30px;
            font-size: 12px
        }

        .av-md {
            width: 38px;
            height: 38px;
            font-size: 15px
        }

        .av-lg {
            width: 78px;
            height: 78px;
            font-size: 28px
        }

        .av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        /* DASHBOARD */
        .dash-body {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        .sidebar {
            width: 256px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .sidebar-hd {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            color: var(--txt3);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: background .14s;
            border-left: 3px solid transparent
        }

        .sidebar-item:hover {
            background: var(--surface2)
        }

        .sidebar-item.active {
            background: var(--accent-gl);
            border-left-color: var(--accent)
        }

        .si-icon {
            width: 30px;
            height: 30px;
            background: var(--accent-gl);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0
        }

        .si-text {
            flex: 1;
            min-width: 0
        }

        .si-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .si-sub {
            font-size: 11px;
            color: var(--txt3);
            margin-top: 1px
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border)
        }

        .main-panel {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .search-bar {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        .search-bar input {
            max-width: 440px
        }

        .panel-hd {
            padding: 14px 18px 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--txt3);
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0
        }

        .subjects-grid {
            flex: 1;
            overflow-y: auto;
            padding: 0 18px 18px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(258px, 1fr));
            gap: 13px;
            align-content: start
        }

        .subject-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 18px;
            transition: border-color .18s, box-shadow .18s;
            animation: fadeUp .22s ease both;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .subject-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent)
        }

        .sc-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px
        }

        .sc-name {
            font-size: 14px;
            font-weight: 700
        }

        .sc-desc {
            font-size: 13px;
            color: var(--txt2);
            line-height: 1.6;
            flex: 1
        }

        .sc-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .sc-members {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--txt3)
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 99px;
            background: var(--accent-gl);
            color: var(--accent);
            font-family: monospace;
            flex-shrink: 0
        }

        .badge-admin {
            background: rgba(245, 158, 11, .15);
            color: var(--yellow)
        }

        .badge-pending {
            background: rgba(249, 115, 22, .15);
            color: var(--orange)
        }

        .badge-approved {
            background: rgba(34, 197, 94, .15);
            color: var(--green)
        }

        .badge-rejected {
            background: rgba(239, 68, 68, .15);
            color: var(--red)
        }

        .empty-state {
            grid-column: 1/-1;
            padding: 60px 20px;
            text-align: center;
            color: var(--txt3)
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px
        }

        .empty-state p {
            font-size: 14px
        }

        /* CHAT BTN on card */
        .chat-entry-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: var(--r-sm);
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 600
        }

        .chat-entry-btn:hover {
            background: var(--accent-d)
        }

        /* ADMIN PAGE */
        .admin-page {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px
        }

        .admin-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: var(--r-sm);
            padding: 4px;
            width: fit-content;
            margin-bottom: 4px
        }

        .admin-tab-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            background: transparent;
            color: var(--txt2);
            border-radius: var(--r-sm)
        }

        .admin-tab-btn.active {
            background: var(--accent);
            color: #fff
        }

        .admin-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden
        }

        .admin-section-hd {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700
        }

        .admin-table-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead th {
            padding: 10px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--txt3);
            text-transform: uppercase;
            letter-spacing: .7px;
            border-bottom: 1px solid var(--border)
        }

        tbody td {
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--txt);
            vertical-align: middle
        }

        tbody tr:last-child td {
            border-bottom: none
        }

        tbody tr:hover td {
            background: var(--surface2)
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            padding: 18px
        }

        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 16px
        }

        .stat-val {
            font-size: 28px;
            font-weight: 700
        }

        .stat-lbl {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 4px
        }

        /* REQUESTS */
        .req-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start
        }

        .req-body {
            flex: 1;
            min-width: 0
        }

        .req-name {
            font-size: 14px;
            font-weight: 700
        }

        .req-meta {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 3px
        }

        .req-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0
        }

        /* CHAT */
        .chat-shell {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .back-btn {
            background: none;
            color: var(--txt2);
            font-size: 18px;
            padding: 4px 8px
        }

        .back-btn:hover {
            color: var(--accent)
        }

        .chat-header-info h2 {
            font-size: 15px;
            font-weight: 700
        }

        .chat-header-info p {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 1px
        }

        .chat-header-right {
            display: flex;
            gap: 6px
        }

        .chat-body {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .msgs-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .msgs-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .msg-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            animation: fadeUp .18s ease both
        }

        .msg-group.own {
            flex-direction: row-reverse
        }

        .msg-group.own .msg-meta {
            text-align: right
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            max-width: 64%
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 700;
            color: var(--txt2);
            margin-bottom: 3px
        }

        .msg-bubble {
            padding: 9px 13px;
            border-radius: var(--r-md);
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word
        }

        .msg-bubble.own {
            background: var(--accent);
            color: #fff;
            border-radius: var(--r-md) 4px var(--r-md) var(--r-md)
        }

        .msg-bubble.other {
            background: var(--surface2);
            color: var(--txt);
            border: 1px solid var(--border);
            border-radius: 4px var(--r-md) var(--r-md) var(--r-md)
        }

        .msg-meta {
            font-size: 11px;
            color: var(--txt3);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .msg-del-btn {
            color: var(--red);
            cursor: pointer;
            font-size: 11px;
            background: none;
            padding: 0;
            font-weight: 600;
            border: none
        }

        .msg-del-btn:hover {
            text-decoration: underline
        }

        .msg-attachment {
            margin-top: 6px
        }

        .msg-attachment img,
        .msg-attachment video {
            max-width: 260px;
            max-height: 220px;
            border-radius: var(--r-sm);
            display: block;
            cursor: pointer;
            object-fit: cover
        }

        .msg-file {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 9px 13px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            max-width: 280px
        }

        .msg-file:hover {
            border-color: var(--accent)
        }

        .msg-file-icon {
            font-size: 22px
        }

        .msg-file-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .msg-file-size {
            font-size: 11px;
            color: var(--txt3);
            margin-top: 1px
        }

        .msg-input-area {
            padding: 10px 18px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .attach-strip {
            display: flex;
            gap: 7px;
            flex-wrap: wrap
        }

        .attach-thumb {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: var(--r-sm);
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border)
        }

        .attach-thumb img,
        .attach-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .attach-thumb .attach-icon {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            font-size: 22px
        }

        .attach-thumb .rm-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, .65);
            color: #fff;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .upload-bar {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 13px;
            background: var(--accent-gl);
            border: 1px solid var(--accent);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--accent)
        }

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin .55s linear infinite;
            flex-shrink: 0
        }

        .msg-input-row {
            display: flex;
            align-items: flex-end;
            gap: 7px
        }

        .msg-input-row textarea {
            flex: 1;
            resize: none;
            border-radius: var(--r-md);
            padding: 9px 13px;
            max-height: 110px;
            line-height: 1.5
        }

        .attach-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            color: var(--txt2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 17px;
            flex-shrink: 0
        }

        .attach-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .send-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #fff;
            border-radius: var(--r-sm);
            font-size: 17px;
            flex-shrink: 0
        }

        .send-btn:hover {
            background: var(--accent-d)
        }

        .members-panel {
            width: 230px;
            flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .members-hd {
            padding: 12px 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--txt3);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border)
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 7px;
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 9px;
            border-radius: var(--r-sm)
        }

        .member-row:hover {
            background: var(--surface2)
        }

        .member-name-text {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .member-email-text {
            font-size: 11px;
            color: var(--txt3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .72);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn .18s ease
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 26px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeUp .22s ease
        }

        .modal-box.wide {
            max-width: 580px
        }

        .modal-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px
        }

        .modal-hd h2 {
            font-size: 17px;
            font-weight: 700
        }

        .modal-close {
            background: none;
            color: var(--txt2);
            font-size: 22px;
            padding: 2px 6px;
            line-height: 1
        }

        .modal-close:hover {
            color: var(--txt)
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px
        }

        .modal-footer {
            display: flex;
            gap: 9px;
            justify-content: flex-end;
            margin-top: 6px
        }

        .avatar-zone {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--surface2);
            border-radius: var(--r-md);
            border: 1px solid var(--border)
        }

        .avatar-zone-right {
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .avatar-change-btn {
            background: var(--surface);
            color: var(--txt);
            border: 1px solid var(--border);
            padding: 6px 13px;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--r-sm)
        }

        .avatar-change-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn .18s ease
        }

        .lightbox img,
        .lightbox video {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: var(--r-md)
        }

        .lightbox-close {
            position: absolute;
            top: 18px;
            right: 22px;
            color: #fff;
            font-size: 30px;
            background: none;
            line-height: 1
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 22px;
            right: 22px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            z-index: 3000
        }

        .toast {
            padding: 11px 16px;
            border-radius: var(--r-md);
            font-size: 13px;
            font-weight: 600;
            animation: fadeUp .22s ease;
            max-width: 310px
        }

        .toast.error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b
        }

        .toast.success {
            background: #064e3b;
            color: #6ee7b7;
            border: 1px solid #059669
        }

        .toast.info {
            background: var(--accent-gl);
            color: var(--accent);
            border: 1px solid var(--accent)
        }

        .warning-text {
            padding: 12px 14px;
            background: rgba(245, 158, 11, .1);
            border: 1px solid rgba(245, 158, 11, .3);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--yellow);
            margin-bottom: 12px
        }

        .info-text {
            padding: 12px 14px;
            background: rgba(108, 99, 255, .1);
            border: 1px solid rgba(108, 99, 255, .3);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--accent)
        }

        /* schedule upload area */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--r-md);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color .18s
        }

        .upload-zone:hover {
            border-color: var(--accent)
        }

        .upload-zone.has-file {
            border-color: var(--green);
            background: rgba(34, 197, 94, .06)
        }

        .upload-zone-icon {
            font-size: 30px;
            margin-bottom: 8px
        }

        .upload-zone-text {
            font-size: 13px;
            color: var(--txt2)
        }

        .upload-zone-file {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
            margin-top: 6px
        }

        /* Notification dot */
        .notif-dot {
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            flex-shrink: 0
        }

        @media(max-width:900px) {
            .sidebar {
                display: none
            }

            .members-panel {
                display: none
            }
        }

        @media(max-width:640px) {
            .auth-box {
                padding: 24px 18px
            }

            .subjects-grid {
                grid-template-columns: 1fr
            }

            .msg-content {
                max-width: 82%
            }

            .topnav {
                padding: 10px 14px
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar"
        multiple style="display:none">
    <input type="file" id="avatarInput" accept="image/*" style="display:none">
    <input type="file" id="scheduleInput" accept="image/*,.pdf" style="display:none">
    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ═══════════════ CONFIG ═══════════════ */
        const CFG = {
            SUPABASE_URL: 'https://gnzuvcldhnzbibcxqrez.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduenV2Y2xkaG56YmliY3hxcmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTI3NjEsImV4cCI6MjA5Nzg2ODc2MX0.YpQHwjwlPVvBPD9MkegUiP3HxOBevWRrzaEPQFqsgdo',
            ADMIN_SECRET: 'ADMIN2025'  // ← Change this to your secret admin registration code
        };

        const { createClient } = window.supabase;
        const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY);

        /* ═══════════════ STATE ═══════════════ */
        const S = {
            user: null, profile: null,
            page: 'auth',
            authMode: 'login',
            isAdminSignup: false,
            adminCode: '',
            subjects: [], mySubjects: [],
            adminSubjects: [], adminUsers: [], adminRequests: [],
            adminTab: 'overview',
            adminStats: { subjects: 0, users: 0, messages: 0, pending: 0 },
            currentSubject: null,
            messages: [], members: [],
            searchTerm: '',
            pendingFiles: [], scheduleFile: null, uploading: false,
            modal: null,
            editSubjectData: null,
            deleteTarget: null,
            lightboxSrc: null, lightboxType: null,
            showMembers: false,
            myRequests: [],
            ivals: {}
        };

        /* ═══════════════ TOAST ═══════════════ */
        function toast(msg, type = 'info', dur = 4000) {
            const c = document.getElementById('toastContainer');
            if (!c) return;
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            c.appendChild(el);
            setTimeout(() => { el.style.cssText = 'opacity:0;transition:opacity .3s'; setTimeout(() => el.remove(), 320); }, dur);
        }

        /* ═══════════════ INIT ═══════════════ */
        async function init() {
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    S.user = user;
                    await loadProfile();
                    S.page = 'dashboard';
                    await loadMySubjects();
                    await loadMyRequests();
                    startIvals();
                }
            } catch (e) { console.error('init:', e); }
            render();

            document.getElementById('fileInput').addEventListener('change', e => {
                S.pendingFiles = [...S.pendingFiles, ...Array.from(e.target.files)];
                e.target.value = ''; render();
            });
            document.getElementById('avatarInput').addEventListener('change', async e => {
                const f = e.target.files[0]; if (f) await uploadAvatar(f); e.target.value = '';
            });
            document.getElementById('scheduleInput').addEventListener('change', e => {
                S.scheduleFile = e.target.files[0] || null; e.target.value = ''; render();
            });
        }

        /* ═══════════════ INTERVALS ═══════════════ */
        function startIvals() {
            clearIvals();
            S.ivals.subj = setInterval(async () => {
                if (S.page === 'dashboard') { await loadSubjects(); updateDashGrid(); }
            }, 7000);
            S.ivals.msgs = setInterval(async () => {
                if (S.page === 'chat' && S.currentSubject) await loadMessages(true);
            }, 3000);
            S.ivals.req = setInterval(async () => {
                if (S.page === 'admin' && isAdmin()) {
                    await loadAdminData();
                    const badge = document.getElementById('pendingBadge');
                    if (badge) badge.textContent = S.adminStats.pending;
                }
            }, 10000);
        }
        function clearIvals() { Object.values(S.ivals).forEach(clearInterval); S.ivals = {}; }

        /* ═══════════════ AUTH ═══════════════ */
        async function handleLogin(e) {
            e.preventDefault();
            const email = v('authEmail'), pass = v('authPassword');
            if (!email || !pass) { toast('Fill in all fields', 'error'); return; }
            setBtn('authBtn', true, 'Signing in…');
            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if (error) throw error;
                S.user = data.user;
                await loadProfile();
                S.page = 'dashboard';
                await loadMySubjects();
                await loadMyRequests();
                startIvals();
                render();
            } catch (e) { toast(e.message, 'error'); }
            finally { setBtn('authBtn', false, 'Sign In'); }
        }

        async function handleSignUp(e) {
            e.preventDefault();
            const email = v('authEmail'), pass = v('authPassword'), name = v('authName');
            const isAdm = S.isAdminSignup;
            const code = v('adminCodeInput');

            if (!email || !pass) { toast('Fill in all fields', 'error'); return; }
            if (pass.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
            if (isAdm && code !== CFG.ADMIN_SECRET) { toast('Invalid admin code', 'error'); return; }

            setBtn('authBtn', true, 'Creating…');
            try {
                const { data, error } = await sb.auth.signUp({
                    email, password: pass,
                    options: { data: { display_name: name || email.split('@')[0] } }
                });
                if (error) throw error;
                if (!data.user) { toast('Check your email to confirm your account.', 'info', 7000); return; }
                await sb.from('users').upsert({
                    id: data.user.id, email,
                    display_name: name || email.split('@')[0],
                    is_admin: isAdm
                }, { onConflict: 'id' });
                S.user = data.user;
                await loadProfile();
                S.page = 'dashboard';
                await loadMySubjects();
                await loadMyRequests();
                startIvals();
                if (isAdm) toast('Admin account created!', 'success');
                render();
            } catch (e) { toast(e.message, 'error'); }
            finally { setBtn('authBtn', false, 'Create Account'); }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            Object.assign(S, { user: null, profile: null, page: 'auth', currentSubject: null, mySubjects: [], subjects: [], modal: null, myRequests: [] });
            clearIvals(); render();
        }

        /* ═══════════════ PROFILE ═══════════════ */
        async function loadProfile() {
            if (!S.user) return;
            const { data, error } = await sb.from('users').select('*').eq('id', S.user.id).single();
            if (!error && data) S.profile = data;
        }

        async function saveProfile() {
            const name = v('profileName'), bio = v('profileBio');
            try {
                const { error } = await sb.from('users').update({ display_name: name, bio }).eq('id', S.user.id);
                if (error) throw error;
                await loadProfile(); S.modal = null;
                toast('Profile saved!', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function uploadAvatar(file) {
            S.uploading = true; render();
            try {
                const ext = file.name.split('.').pop();
                const path = `${S.user.id}/avatar.${ext}`;
                const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true, contentType: file.type });
                if (upErr) throw upErr;
                const { data: ud } = sb.storage.from('avatars').getPublicUrl(path);
                const url = ud.publicUrl + '?t=' + Date.now();
                await sb.from('users').update({ avatar_url: url }).eq('id', S.user.id);
                await loadProfile();
                toast('Photo updated!', 'success');
            } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
            finally { S.uploading = false; render(); }
        }

        /* ═══════════════ SUBJECTS ═══════════════ */
        async function loadSubjects() {
            let q = sb.from('subjects').select('*');
            if (S.searchTerm.trim()) q = q.or(`name.ilike.%${S.searchTerm}%,code.ilike.%${S.searchTerm}%`);
            const { data } = await q.order('created_at', { ascending: false });
            S.subjects = data || [];
        }

        async function loadMySubjects() {
            const { data } = await sb.from('user_subjects')
                .select('subject_id, subjects(*)').eq('user_id', S.user.id);
            S.mySubjects = (data || []).map(r => r.subjects).filter(Boolean);
            await loadSubjects();
        }

        async function joinSubject(id) {
            try {
                const { error } = await sb.from('user_subjects').insert({ user_id: S.user.id, subject_id: id });
                if (error) throw error;
                await loadMySubjects(); toast('Joined!', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function leaveSubject() {
            try {
                await sb.from('user_subjects').delete().eq('user_id', S.user.id).eq('subject_id', S.currentSubject.id);
                S.currentSubject = null; S.page = 'dashboard';
                await loadMySubjects(); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function createSubject() {
            const name = v('newSubjName'), code = v('newSubjCode').toUpperCase(), desc = v('newSubjDesc');
            if (!name || !code) { toast('Name and code are required', 'error'); return; }
            try {
                const { data, error } = await sb.from('subjects')
                    .insert({ name, code, description: desc, created_by: S.user.id }).select().single();
                if (error) throw error;
                await sb.from('user_subjects').insert({ user_id: S.user.id, subject_id: data.id });
                await loadMySubjects();
                if (S.page === 'admin') await loadAdminData();
                S.modal = null; toast('Subject created!', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function updateSubject() {
            const name = v('editSubjName'), code = v('editSubjCode').toUpperCase(), desc = v('editSubjDesc');
            if (!name || !code) { toast('Name and code are required', 'error'); return; }
            try {
                const { error } = await sb.from('subjects')
                    .update({ name, code, description: desc }).eq('id', S.editSubjectData.id);
                if (error) throw error;
                await loadMySubjects(); await loadAdminData();
                S.modal = null; toast('Subject updated!', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function deleteSubject(id) {
            try {
                await sb.from('messages').delete().eq('subject_id', id);
                await sb.from('user_subjects').delete().eq('subject_id', id);
                // delete join requests too
                try { await sb.from('join_requests').delete().eq('subject_id', id); } catch (e) { }
                await sb.from('subjects').delete().eq('id', id);
                await loadMySubjects(); await loadAdminData();
                S.modal = null; toast('Subject deleted.', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        /* ═══════════════ JOIN REQUESTS ═══════════════ */
        async function loadMyRequests() {
            if (!S.user) return;
            try {
                const { data } = await sb.from('join_requests')
                    .select('*, subjects(name, code)').eq('user_id', S.user.id);
                S.myRequests = data || [];
            } catch (e) { S.myRequests = []; }
        }

        async function submitJoinRequest(subjectId) {
            if (!S.scheduleFile) { toast('Please attach your schedule file', 'error'); return; }
            S.uploading = true; render();
            try {
                const ext = S.scheduleFile.name.split('.').pop();
                const path = `requests/${S.user.id}_${subjectId}_${Date.now()}.${ext}`;
                const { error: upErr } = await sb.storage.from('subject-join-verifications').upload(path, S.scheduleFile, { upsert: true, contentType: S.scheduleFile.type });
                if (upErr) throw upErr;
                const { data: ud } = sb.storage.from('subject-join-verifications').getPublicUrl(path);
                const { error } = await sb.from('join_requests').upsert({
                    user_id: S.user.id, subject_id: subjectId,
                    schedule_url: ud.publicUrl,
                    schedule_name: S.scheduleFile.name,
                    status: 'pending'
                }, { onConflict: 'user_id,subject_id' });
                if (error) throw error;
                await loadMyRequests();
                S.scheduleFile = null; S.modal = null;
                toast('Request submitted! Admin will review your schedule.', 'success');
            } catch (e) { toast('Failed: ' + e.message, 'error'); }
            finally { S.uploading = false; render(); }
        }

        async function loadAdminRequests() {
            try {
                const { data } = await sb.from('join_requests')
                    .select('*, users(id, email, display_name, avatar_url), subjects(id, name, code)')
                    .eq('status', 'pending').order('created_at', { ascending: false });
                S.adminRequests = data || [];
            } catch (e) { S.adminRequests = []; }
        }

        async function approveRequest(req) {
            try {
                await sb.from('join_requests').update({ status: 'approved' }).eq('id', req.id);
                await sb.from('user_subjects').upsert({ user_id: req.user_id, subject_id: req.subject_id }, { onConflict: 'user_id,subject_id' });
                await loadAdminData();
                toast('Request approved — user has joined the group!', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function rejectRequest(id) {
            try {
                await sb.from('join_requests').update({ status: 'rejected' }).eq('id', id);
                await loadAdminData();
                toast('Request rejected.', 'info'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        /* ═══════════════ ADMIN DATA ═══════════════ */
        async function loadAdminData() {
            if (!isAdmin()) { toast('Access denied', 'error'); return; }
            const [subjRes, userRes, msgRes, reqRes] = await Promise.all([
                sb.from('subjects').select('*, users(display_name, email)').order('created_at', { ascending: false }),
                sb.from('users').select('*').order('created_at', { ascending: false }),
                sb.from('messages').select('id', { count: 'exact', head: true }),
                sb.from('join_requests').select('id', { count: 'exact', head: true }).eq('status', 'pending')
            ]);
            S.adminSubjects = subjRes.data || [];
            S.adminUsers = userRes.data || [];
            S.adminStats = {
                subjects: (subjRes.data || []).length,
                users: (userRes.data || []).length,
                messages: msgRes.count || 0,
                pending: reqRes.count || 0
            };
            await loadAdminRequests();
        }

        async function toggleAdminRole(userId, currentIsAdmin) {
            if (!isAdmin()) { toast('Access denied', 'error'); return; }
            try {
                const { error } = await sb.from('users').update({ is_admin: !currentIsAdmin }).eq('id', userId);
                if (error) throw error;
                await loadAdminData();
                toast(currentIsAdmin ? 'Admin removed.' : 'Admin granted.', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function deleteUser(userId) {
            if (!isAdmin()) { toast('Access denied', 'error'); return; }
            if (userId === S.user.id) { toast('Cannot delete your own account', 'error'); return; }
            try {
                await sb.from('messages').delete().eq('user_id', userId);
                await sb.from('user_subjects').delete().eq('user_id', userId);
                try { await sb.from('join_requests').delete().eq('user_id', userId); } catch (e) { }
                await sb.from('users').delete().eq('id', userId);
                await loadAdminData(); S.modal = null;
                toast('User removed.', 'success'); render();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function adminDeleteMsg(id) {
            if (!isAdmin()) { toast('Access denied', 'error'); return; }
            try {
                await sb.from('messages').delete().eq('id', id);
                await loadMessages();
            } catch (e) { toast(e.message, 'error'); }
        }

        function goAdmin() {
            if (!isAdmin()) { toast('Admin access required', 'error'); return; }
            S.page = 'admin'; S.adminTab = 'overview';
            loadAdminData().then(render);
        }

        /* ═══════════════ MESSAGES ═══════════════ */
        async function loadMessages(silent = false) {
            if (!S.currentSubject) return;
            const { data, error } = await sb.from('messages')
                .select('*, users(id, email, display_name, avatar_url)')
                .eq('subject_id', S.currentSubject.id).order('created_at', { ascending: true });
            if (error) { console.error('loadMessages:', error); return; }
            const prev = S.messages.length;
            S.messages = data || [];
            if (!silent || S.messages.length !== prev) { updateMessagesDOM(); scrollBottom(); }
        }

        async function loadMembers() {
            if (!S.currentSubject) return;
            const { data } = await sb.from('user_subjects')
                .select('user_id, users(id, email, display_name, avatar_url)').eq('subject_id', S.currentSubject.id);
            S.members = (data || []).map(r => r.users).filter(Boolean);
        }

        async function sendMessage() {
            const ta = document.getElementById('msgInput');
            const text = (ta?.value || '').trim();
            if (!text && S.pendingFiles.length === 0) return;
            const files = [...S.pendingFiles];
            S.pendingFiles = [];
            if (ta) ta.value = '';
            if (files.length > 0) { S.uploading = true; render(); }
            try {
                for (const file of files) {
                    const aType = attachType(file);
                    const ext = file.name.split('.').pop();
                    const path = `${S.currentSubject.id}/${Date.now()}_${rnd()}.${ext}`;
                    const { error: upErr } = await sb.storage.from('chat-attachments').upload(path, file, { contentType: file.type });
                    if (upErr) throw upErr;
                    const { data: ud } = sb.storage.from('chat-attachments').getPublicUrl(path);
                    await sb.from('messages').insert({
                        subject_id: S.currentSubject.id, user_id: S.user.id,
                        message: null, attachment_url: ud.publicUrl,
                        attachment_name: file.name, attachment_type: aType, attachment_size: file.size
                    });
                }
                if (text) {
                    const { error } = await sb.from('messages').insert({
                        subject_id: S.currentSubject.id, user_id: S.user.id, message: text
                    });
                    if (error) throw error;
                }
                await loadMessages();
            } catch (e) { toast('Send failed: ' + e.message, 'error'); }
            finally { S.uploading = false; render(); }
        }

        async function deleteMessage(id) {
            try {
                const { error } = await sb.from('messages').delete().eq('id', id).eq('user_id', S.user.id);
                if (error) throw error;
                await loadMessages();
            } catch (e) { toast(e.message, 'error'); }
        }

        /* ═══════════════ NAVIGATION ═══════════════ */
        async function goToChat(subj) {
            S.currentSubject = subj; S.page = 'chat';
            S.messages = []; S.members = []; S.pendingFiles = []; S.showMembers = false;
            render();
            await Promise.all([loadMessages(), loadMembers()]);
            render(); scrollBottom();
        }

        function goToDashboard() { S.page = 'dashboard'; S.currentSubject = null; render(); }

        function confirmDelete(type, id, label) {
            S.modal = 'confirmDelete'; S.deleteTarget = { type, id, label }; render();
        }

        async function executeDelete() {
            const t = S.deleteTarget; if (!t) return;
            if (t.type === 'subject') await deleteSubject(t.id);
            else if (t.type === 'user') await deleteUser(t.id);
            S.deleteTarget = null;
        }

        /* ═══════════════ REQUEST MODAL ═══════════════ */
        function openRequestModal(subj) {
            S.modal = 'joinRequest';
            S.editSubjectData = subj; // reuse to store target subject
            S.scheduleFile = null;
            render();
        }

        /* ═══════════════ UTILS ═══════════════ */
        function v(id) { return (document.getElementById(id)?.value || '').trim(); }
        function rnd() { return Math.random().toString(36).slice(2, 9); }
        function setBtn(id, dis, label) { const b = document.getElementById(id); if (b) { b.disabled = dis; b.textContent = label; } }
        function attachType(f) { return f.type.startsWith('image/') ? 'image' : f.type.startsWith('video/') ? 'video' : 'file'; }
        function fmtSize(b) { if (!b) return ''; if (b < 1024) return b + 'B'; if (b < 1048576) return (b / 1024).toFixed(1) + 'KB'; return (b / 1048576).toFixed(1) + 'MB'; }
        function tstr(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function dateStr(ts) { return new Date(ts).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' }); }
        function esc(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c])); }
        const BG_COLORS = ['#6c63ff', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];
        function avColor(str) { let h = 0; for (let i = 0; i < (str || '').length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xffffffff; return BG_COLORS[Math.abs(h) % BG_COLORS.length]; }
        function avHTML(user, cls = 'av av-sm') {
            const name = user?.display_name || user?.email || '?';
            const init = name.charAt(0).toUpperCase();
            if (user?.avatar_url) return `<div class="${cls}"><img src="${esc(user.avatar_url)}" alt="${esc(name)}"></div>`;
            return `<div class="${cls}" style="background:${avColor(name)}">${init}</div>`;
        }
        function fileIcon(name) {
            const ext = (name || '').split('.').pop().toLowerCase();
            return { pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📊', pptx: '📊', zip: '🗜️', rar: '🗜️', txt: '📃' }[ext] || '📎';
        }
        function scrollBottom() { setTimeout(() => { const c = document.querySelector('.msgs-scroll'); if (c) c.scrollTop = c.scrollHeight; }, 60); }
        function isAdmin() { return !!S.profile?.is_admin; }
        function openLightbox(src, type) { S.modal = 'lightbox'; S.lightboxSrc = src; S.lightboxType = type; render(); }
        function removePendingFile(i) { S.pendingFiles.splice(i, 1); render(); }
        function safeJson(obj) { return JSON.stringify(obj).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }
        function myRequestForSubject(sid) { return S.myRequests.find(r => r.subject_id === sid); }
        function isMember(sid) { return S.mySubjects.some(s => s.id === sid); }

        /* ═══════════════ RENDER ROUTER ═══════════════ */
        function render() {
            const root = document.getElementById('app');
            let html = '';
            if (S.page === 'auth') html = renderAuth();
            else if (S.page === 'dashboard') html = renderDashboard();
            else if (S.page === 'admin') html = renderAdminPage();
            else if (S.page === 'chat') html = renderChat();

            if (S.modal === 'profile') html += renderProfileModal();
            else if (S.modal === 'newSubject') html += renderNewSubjectModal();
            else if (S.modal === 'editSubject') html += renderEditSubjectModal();
            else if (S.modal === 'joinRequest') html += renderJoinRequestModal();
            else if (S.modal === 'lightbox') html += renderLightbox();
            else if (S.modal === 'confirmDelete') html += renderConfirmModal();
            else if (S.modal === 'viewSchedule') html += renderViewScheduleModal();

            root.innerHTML = html;
            if (S.page === 'auth') setTimeout(() => document.getElementById('authEmail')?.focus(), 80);
            if (S.page === 'chat') setTimeout(() => document.getElementById('msgInput')?.focus(), 80);
        }

        function updateMessagesDOM() {
            const c = document.querySelector('.msgs-scroll');
            if (c) { c.innerHTML = renderMessages(); scrollBottom(); }
        }

        function updateDashGrid() {
            const g = document.querySelector('.subjects-grid');
            if (g) g.innerHTML = allSubjectsHTML();
        }

        /* ═══════════════ AUTH RENDER ═══════════════ */
        function renderAuth() {
            const isLogin = S.authMode === 'login';
            return `
    <div class="auth-page page">
        <div class="auth-box fade-up">
        <div class="auth-logo">
            <div class="icon">💬</div>
            <h1>ChatGroups</h1>
            <p>Study together, learn together</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab ${isLogin ? 'active' : ''}" onclick="S.authMode='login';S.isAdminSignup=false;render()">Sign In</button>
            <button class="auth-tab ${!isLogin ? 'active' : ''}" onclick="S.authMode='signup';render()">Sign Up</button>
        </div>
        <form class="auth-form" onsubmit="${isLogin ? 'handleLogin' : 'handleSignUp'}(event)">
            ${!isLogin ? `
            <div class="form-field"><label>Display Name</label><input id="authName" type="text" placeholder="Your name"></div>
            ` : ''}
            <div class="form-field"><label>Email</label><input id="authEmail" type="email" placeholder="you@example.com" required></div>
            <div class="form-field"><label>Password</label><input id="authPassword" type="password" placeholder="Min. 6 characters" required minlength="6"></div>
            ${!isLogin ? `
            <div class="admin-toggle-row" onclick="S.isAdminSignup=!S.isAdminSignup;render()">
                <input type="checkbox" id="isAdminCheck" ${S.isAdminSignup ? 'checked' : ''} onchange="S.isAdminSignup=this.checked;render()">
                <label for="isAdminCheck">⚙ Register as Administrator</label>
            </div>
            ${S.isAdminSignup ? `
                <div class="form-field">
                <label>Admin Secret Code</label>
                <input id="adminCodeInput" type="password" placeholder="Enter admin code" autocomplete="off">
                <span style="font-size:12px;color:var(--txt3);">Contact your system administrator for the code.</span>
                </div>
            ` : ''}
            ` : ''}
            <button id="authBtn" type="submit" class="btn btn-primary" style="width:100%;padding:12px;margin-top:4px;">
            ${isLogin ? 'Sign In' : 'Create Account'}
            </button>
        </form>
        </div>
    </div>`;
        }

        /* ═══════════════ TOPNAV ═══════════════ */
        function renderTopNav() {
            const name = S.profile?.display_name || S.user?.email || '';
            const admin = isAdmin();
            const pendingCount = S.adminStats.pending || 0;
            return `
    <nav class="topnav">
        <div class="topnav-brand">
        <div class="dot">💬</div>
        ChatGroups
        ${admin ? '<span class="admin-badge">ADMIN</span>' : ''}
        </div>
        <div class="topnav-actions">
        ${S.page === 'dashboard' && admin ? `
            <button class="btn btn-warn btn-sm" onclick="goAdmin()" style="display:flex;align-items:center;gap:6px">
            ⚙ Admin Panel
            ${pendingCount > 0 ? `<span style="background:#ef4444;color:#fff;border-radius:99px;padding:1px 6px;font-size:11px">${pendingCount}</span>` : ''}
            </button>
        ` : ''}
        ${S.page === 'admin' ? `<button class="btn btn-ghost btn-sm" onclick="goToDashboard()">← Dashboard</button>` : ''}
        <button class="avatar-btn" onclick="S.modal='profile';render()" title="Profile settings">
            ${S.profile?.avatar_url ? `<img src="${esc(S.profile.avatar_url)}" alt="">` : `<span>${esc(name.charAt(0).toUpperCase())}</span>`}
        </button>
        <button class="btn btn-danger btn-sm" onclick="handleLogout()">Sign out</button>
        </div>
    </nav>`;
        }

        /* ═══════════════ DASHBOARD ═══════════════ */
        function allSubjectsHTML() {
            if (S.subjects.length === 0) {
                return `<div class="empty-state"><div class="empty-state-icon">${S.searchTerm ? '🔍' : '📚'}</div><p>${S.searchTerm ? 'No subjects match your search' : 'No subjects available yet.'}</p></div>`;
            }
            return S.subjects.map(s => {
                const joined = isMember(s.id);
                const req = myRequestForSubject(s.id);
                let actionHTML = '';
                if (joined) {
                    actionHTML = `<button class="chat-entry-btn" onclick="goToChat(${safeJson(s)})">💬 Open Chat</button>`;
                } else if (req) {
                    const statusColors = { pending: 'badge-pending', approved: 'badge-approved', rejected: 'badge-rejected' };
                    const statusEmoji = { pending: '⏳', approved: '✅', rejected: '❌' };
                    actionHTML = `<span class="badge ${statusColors[req.status]}">${statusEmoji[req.status]} ${req.status.charAt(0).toUpperCase() + req.status.slice(1)}</span>`;
                    if (req.status === 'rejected') {
                        actionHTML += `<button class="btn btn-ghost btn-sm" onclick="openRequestModal(${safeJson(s)})">↩ Re-apply</button>`;
                    }
                } else {
                    // Not joined, no request
                    if (isAdmin()) {
                        actionHTML = `<button class="btn btn-primary btn-sm" onclick="joinSubject('${esc(s.id)}')">+ Join</button>`;
                    } else {
                        actionHTML = `<button class="btn btn-primary btn-sm" onclick="openRequestModal(${safeJson(s)})">📋 Request to Join</button>`;
                    }
                }
                return `
        <div class="subject-card">
        <div class="sc-head">
            <div class="sc-name">${esc(s.name)}</div>
            <span class="badge">${esc(s.code)}</span>
        </div>
        <div class="sc-desc">${esc(s.description || 'No description provided.')}</div>
        <div class="sc-actions">${actionHTML}</div>
        </div>`;
            }).join('');
        }

        function renderDashboard() {
            // Group: my subjects in sidebar, all in main
            const mySubjectsHTML = S.mySubjects.length === 0
                ? `<div style="padding:18px 12px;text-align:center;color:var(--txt3);font-size:13px;">Join a subject to start</div>`
                : S.mySubjects.map(s => `
        <div class="sidebar-item" onclick="goToChat(${safeJson(s)})">
            <div class="si-icon">📚</div>
            <div class="si-text">
            <div class="si-name">${esc(s.name)}</div>
            <div class="si-sub">${esc(s.code)}</div>
            </div>
            <span style="font-size:14px">💬</span>
        </div>`).join('');

            // Show pending requests in sidebar
            const pendingReqs = S.myRequests.filter(r => r.status === 'pending');
            const pendingHTML = pendingReqs.length > 0 ? `
        <div style="padding:10px 12px 4px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px">My Requests</div>
        ${pendingReqs.map(r => `
        <div class="sidebar-item" style="cursor:default">
            <div class="si-icon" style="background:rgba(249,115,22,.15)">⏳</div>
            <div class="si-text">
            <div class="si-name">${esc(r.subjects?.name || '—')}</div>
            <div class="si-sub">Awaiting approval</div>
            </div>
        </div>`).join('')}
    ` : '';

            return `
    <div class="shell page">
        ${renderTopNav()}
        <div class="dash-body">
        <aside class="sidebar">
            <div class="sidebar-hd">My Subjects (${S.mySubjects.length})</div>
            <div class="sidebar-list">
            ${mySubjectsHTML}
            ${pendingHTML}
            </div>
            ${isAdmin() ? `<div class="sidebar-footer"><button class="btn btn-warn btn-sm" style="width:100%" onclick="goAdmin()">⚙ Admin Panel</button></div>` : ''}
        </aside>
        <main class="main-panel">
            <div class="search-bar">
            <input type="text" placeholder="🔍 Search subjects by name or code…"
                value="${esc(S.searchTerm)}"
                oninput="S.searchTerm=this.value;loadSubjects().then(updateDashGrid)">
            </div>
            <div class="panel-hd">All Subjects</div>
            <div class="subjects-grid">${allSubjectsHTML()}</div>
        </main>
        </div>
    </div>`;
        }

        function renderAdminPage() {
            const tabs = [
                { id: 'overview', label: '📊 Overview' },
                { id: 'requests', label: `📋 Requests${S.adminStats.pending > 0 ? ` (${S.adminStats.pending})` : ''}` },
                { id: 'subjects', label: '📚 Subjects' },

            return `

        </div>

        ${S.adminTab === 'overview' ? renderAdminOverview() : ''}
        ${S.adminTab === 'requests' ? renderAdminRequests() : ''}
        ${S.adminTab === 'subjects' ? renderAdminSubjects() : ''}
        ${S.adminTab === 'users' ? renderAdminUsers() : ''}
        ${S.adminTab === 'messages' ? renderAdminMessages() : ''}
        </div>
    </div>`;

            return `

        <div class="stat-card"><div class="stat-val">${S.adminStats.users}</div><div class="stat-lbl">Registered Users</div></div>

            <div class="stat-lbl">Pending Requests</div>
        </div>
        </div>
    </div>
    ${S.adminStats.pending > 0 ? `
        <div class="admin-section" style="border-color:var(--orange)">

        <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">
            ${renderRequestCards()}
        </div>

        </div>
        </div>`;
            }).join('');
        }

        function renderAdminRequests() {
            return `

        <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">
        ${renderRequestCards()}
        </div>

        </div>
        <div class="admin-table-wrap">
        <table>
            <thead><tr><th>Name</th><th>Code</th><th>Description</th><th>Created By</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody>

            </tbody>

        </div>

        function renderAdminUsers() {
            return `

        <div class="admin-section-hd">👥 User Management</div>
        <div class="admin-table-wrap">
        <table>
            <thead><tr><th>User</th><th>Email</th><th>Bio</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>
            ${S.adminUsers.length === 0
                    ? `<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:30px">No users</td></tr>`
                    : S.adminUsers.map(u => {

                    <td style="color:var(--txt2)">${esc(u.email)}</td>
