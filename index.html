                            ${u.is_admin ? '⬇ Demote' : '⬆ Promote'}
                            </button>
                            <button class="btn btn-danger btn-xs" onclick="confirmDelete('user','${esc(u.id)}','${esc(u.display_name || u.email)}')">🗑 Remove</button>
                        ` : '<span style="color:var(--txt3);font-size:12px">—</span>'}
                        </div>
                    </td>
                    </tr>`;
                    }).join('')}
            </tbody>
        </table>
        </div>
    </div>`;
        }

        // Admin messages tab — load from all subjects with ability to delete
        function renderAdminMessages() {
            return `
    <div class="admin-section">
        <div class="admin-section-hd">💬 Message Overview</div>
        <div style="padding:20px;text-align:center;color:var(--txt2);font-size:14px">
        <p style="margin-bottom:16px">To manage messages, open a subject's chat. As admin you can delete any message.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
            ${S.adminSubjects.map(s => `
            <button class="btn btn-ghost btn-sm" onclick="goToChat(${safeJson(s)});S.showMembers=false">
                💬 ${esc(s.name)}
            </button>`).join('')}
        </div>
        </div>
    </div>`;
        }

        function openEditSubject(s) { S.editSubjectData = s; S.modal = 'editSubject'; render(); }

        /* ═══════════════ CHAT RENDER ═══════════════ */
        function renderChat() {
            const subj = S.currentSubject;
            return `
    <div class="shell page">
        ${renderTopNav()}
        <div class="chat-shell">
        <div class="chat-header">
            <div class="chat-header-left">
            <button class="back-btn" onclick="goToDashboard()">←</button>
            <div class="chat-header-info">
                <h2>${esc(subj.name)}</h2>
                <p>${esc(subj.code)} · ${S.members.length} member${S.members.length !== 1 ? 's' : ''}</p>
            </div>
            </div>
            <div class="chat-header-right">
            <button class="btn btn-ghost btn-sm" onclick="S.showMembers=!S.showMembers;render()">
                ${S.showMembers ? 'Hide' : '👥'} Members
            </button>
            ${!isAdmin() ? `<button class="btn btn-danger btn-sm" onclick="if(confirm('Leave this subject?'))leaveSubject()">Leave</button>` : ''}
            </div>
        </div>
        <div class="chat-body">
            <div class="msgs-area">
            <div class="msgs-scroll">${renderMessages()}</div>
            ${renderInputArea()}
            </div>
            ${S.showMembers ? renderMembersPanel() : ''}
        </div>
        </div>
    </div>`;
        }

        function renderMessages() {
            if (S.messages.length === 0)
                return `<div class="empty-state"><div class="empty-state-icon">💬</div><p>No messages yet — say hi!</p></div>`;
            return S.messages.map(msg => {
                const isOwn = msg.user_id === S.user.id;
                const canDel = isOwn || isAdmin();
                const user = msg.users || {};
                const delFn = isOwn ? `deleteMessage('${msg.id}')` : `adminDeleteMsg('${msg.id}')`;
                return `
        <div class="msg-group ${isOwn ? 'own' : ''}">
        ${!isOwn ? avHTML(user, 'av av-sm') : ''}
        <div class="msg-content" style="${isOwn ? 'align-items:flex-end' : ''}">
            ${!isOwn ? `<div class="msg-sender">${esc(user.display_name || user.email)}</div>` : ''}
            <div class="msg-bubble ${isOwn ? 'own' : 'other'}">
            ${msg.message ? esc(msg.message) : ''}
            ${msg.attachment_url ? renderAttachment(msg) : ''}
            </div>
            <div class="msg-meta">
            <span>${tstr(msg.created_at)}</span>
            ${canDel ? `<button class="msg-del-btn" onclick="${delFn}">delete</button>` : ''}
            </div>
        </div>
        ${isOwn ? avHTML(S.profile || { email: S.user?.email }, 'av av-sm') : ''}
        </div>`;
            }).join('');
        }

        function renderAttachment(msg) {
            const url = msg.attachment_url, name = msg.attachment_name || 'file', sz = fmtSize(msg.attachment_size);
            if (msg.attachment_type === 'image')
                return `<div class="msg-attachment"><img src="${esc(url)}" alt="${esc(name)}" onclick="openLightbox('${esc(url)}','image')"></div>`;
            if (msg.attachment_type === 'video')
                return `<div class="msg-attachment"><video src="${esc(url)}" controls onclick="openLightbox('${esc(url)}','video')"></video></div>`;
            return `<div class="msg-attachment"><a class="msg-file" href="${esc(url)}" target="_blank" download="${esc(name)}">
        <div class="msg-file-icon">${fileIcon(name)}</div>
        <div><div class="msg-file-name">${esc(name)}</div>${sz ? `<div class="msg-file-size">${sz}</div>` : ''}</div>
        <span style="color:var(--txt3);margin-left:auto">↓</span>
    </a></div>`;
        }

        function renderInputArea() {
            const thumbs = S.pendingFiles.map((f, i) => {
                const isImg = f.type.startsWith('image/'), isVid = f.type.startsWith('video/');
                const url = URL.createObjectURL(f);
                return `<div class="attach-thumb">
        ${isImg ? `<img src="${url}">` : isVid ? `<video src="${url}">` : `<div class="attach-icon">${fileIcon(f.name)}</div>`}
        <button class="rm-btn" type="button" onclick="removePendingFile(${i})">×</button>
        </div>`;
            }).join('');
            return `
    <div class="msg-input-area">
        ${S.pendingFiles.length ? `<div class="attach-strip">${thumbs}</div>` : ''}
        ${S.uploading ? `<div class="upload-bar"><div class="spinner"></div>Uploading…</div>` : ''}
        <div class="msg-input-row">
        <button class="attach-btn" type="button" title="Attach files" onclick="document.getElementById('fileInput').click()">📎</button>
        <textarea id="msgInput" placeholder="Type a message… (Enter to send)" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
        <button class="send-btn" type="button" onclick="sendMessage()">➤</button>
        </div>
    </div>`;
        }

        function renderMembersPanel() {
            return `
    <div class="members-panel">
        <div class="members-hd">Members (${S.members.length})</div>
        <div class="members-list">
        ${S.members.map(m => `
        <div class="member-row">
            ${avHTML(m, 'av av-sm')}
            <div style="flex:1;min-width:0">
            <div class="member-name-text">${esc(m.display_name || m.email)}</div>
            <div class="member-email-text">${esc(m.email)}</div>
            </div>
        </div>`).join('')}
        </div>
    </div>`;
        }

        /* ═══════════════ MODALS ═══════════════ */
        function renderProfileModal() {
            const p = S.profile || {};
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
        <div class="modal-box fade-up">
        <div class="modal-hd"><h2>Profile Settings</h2><button class="modal-close" onclick="S.modal=null;render()">×</button></div>
        <div class="modal-form">
            <div class="avatar-zone">
            ${avHTML(p, 'av av-lg')}
            <div class="avatar-zone-right">
                <div style="font-weight:700">${esc(p.display_name || p.email || '')}</div>
                <div style="font-size:12px;color:var(--txt3)">${esc(p.email || '')}</div>
                ${isAdmin() ? '<span class="badge badge-admin" style="width:fit-content">Administrator</span>' : ''}
                <button class="avatar-change-btn" onclick="document.getElementById('avatarInput').click()" ${S.uploading ? 'disabled' : ''}>
                ${S.uploading ? '⏳ Uploading…' : '📷 Change Photo'}
                </button>
            </div>
            </div>
            <div class="form-field"><label>Display Name</label><input id="profileName" type="text" value="${esc(p.display_name || '')}" placeholder="Your name"></div>
            <div class="form-field"><label>Bio</label><textarea id="profileBio" rows="3" placeholder="Tell something about yourself…">${esc(p.bio || '')}</textarea></div>
            <div class="form-field"><label>Email</label><input type="email" value="${esc(p.email || '')}" disabled></div>
            <div class="modal-footer">
            <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
        </div>
    </div>`;
        }

        function renderJoinRequestModal() {
            const subj = S.editSubjectData || {};
            const hasFile = !!S.scheduleFile;
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;S.scheduleFile=null;render()}">
        <div class="modal-box fade-up">
        <div class="modal-hd">
            <h2>Request to Join</h2>
            <button class="modal-close" onclick="S.modal=null;S.scheduleFile=null;render()">×</button>
        </div>
        <div class="modal-form">
            <div class="info-text">
            📚 You're requesting to join <strong>${esc(subj.name)}</strong> (${esc(subj.code)}).<br>
            Please attach your class schedule to verify you're enrolled in this subject.
            </div>
            <div class="form-field">
            <label>Your Class Schedule</label>
            <div class="upload-zone ${hasFile ? 'has-file' : ''}" onclick="document.getElementById('scheduleInput').click()">
                <div class="upload-zone-icon">${hasFile ? '✅' : '📎'}</div>
                <div class="upload-zone-text">${hasFile ? 'Schedule attached' : 'Click to upload your schedule'}</div>
                ${hasFile ? `<div class="upload-zone-file">${esc(S.scheduleFile.name)}</div>` : `<div style="font-size:12px;color:var(--txt3);margin-top:4px">Accepted: Image or PDF</div>`}
            </div>
            ${hasFile ? `<button class="btn btn-ghost btn-sm" style="width:fit-content;margin-top:4px" onclick="S.scheduleFile=null;render()">Remove file</button>` : ''}
            </div>
            ${S.uploading ? `<div class="upload-bar"><div class="spinner"></div>Submitting request…</div>` : ''}
            <div class="modal-footer">
            <button class="btn btn-ghost" onclick="S.modal=null;S.scheduleFile=null;render()">Cancel</button>
            <button class="btn btn-primary" onclick="submitJoinRequest('${esc(subj.id)}')" ${S.uploading ? 'disabled' : ''}>
                📋 Submit Request
            </button>
            </div>
        </div>
        </div>
    </div>`;
        }

        function renderNewSubjectModal() {
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
        <div class="modal-box fade-up">
        <div class="modal-hd"><h2>Add New Subject</h2><button class="modal-close" onclick="S.modal=null;render()">×</button></div>
        <div class="modal-form">
            <div class="form-field"><label>Subject Name *</label><input id="newSubjName" type="text" placeholder="e.g. Mathematics 101" autofocus></div>
            <div class="form-field"><label>Subject Code *</label><input id="newSubjCode" type="text" placeholder="e.g. MATH101" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
            <div class="form-field"><label>Description</label><textarea id="newSubjDesc" rows="3" placeholder="Brief description of this subject…"></textarea></div>
            <div class="modal-footer">
            <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
            <button class="btn btn-primary" onclick="createSubject()">Create Subject</button>
            </div>
        </div>
        </div>
    </div>`;
        }

        function renderEditSubjectModal() {
            const s = S.editSubjectData || {};
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
        <div class="modal-box fade-up">
        <div class="modal-hd"><h2>Edit Subject</h2><button class="modal-close" onclick="S.modal=null;render()">×</button></div>
        <div class="modal-form">
            <div class="form-field"><label>Subject Name *</label><input id="editSubjName" type="text" value="${esc(s.name || '')}"></div>
            <div class="form-field"><label>Subject Code *</label><input id="editSubjCode" type="text" value="${esc(s.code || '')}" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
            <div class="form-field"><label>Description</label><textarea id="editSubjDesc" rows="3">${esc(s.description || '')}</textarea></div>
            <div class="modal-footer">
            <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
            <button class="btn btn-primary" onclick="updateSubject()">Save Changes</button>
            </div>
        </div>
        </div>
    </div>`;
        }

        function renderConfirmModal() {
            const t = S.deleteTarget || {};
            const isUser = t.type === 'user';
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;S.deleteTarget=null;render()}">
        <div class="modal-box fade-up" style="max-width:380px">
        <div class="modal-hd"><h2>Confirm Delete</h2><button class="modal-close" onclick="S.modal=null;S.deleteTarget=null;render()">×</button></div>
        ${isUser ? '<div class="warning-text">⚠️ This will remove the user and all their messages.</div>' : ''}
        <p style="font-size:14px;color:var(--txt2);line-height:1.6;margin-bottom:20px">
            Are you sure you want to delete <strong style="color:var(--txt)">${esc(t.label)}</strong>?
            ${t.type === 'subject' ? '<br><br>This will also delete <strong>all messages</strong> in this subject.' : ''}
            <br>This action cannot be undone.
        </p>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="S.modal=null;S.deleteTarget=null;render()">Cancel</button>
            <button class="btn btn-danger" onclick="executeDelete()">Delete</button>
        </div>
        </div>
    </div>`;
        }

        function renderViewScheduleModal() {
            const src = S.lightboxSrc; const name = S.lightboxType || 'file';
            const isPdf = name.toLowerCase().endsWith('.pdf');
            return `
    <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
        <div class="modal-box wide fade-up">
        <div class="modal-hd">
            <h2>📎 ${esc(name)}</h2>
            <button class="modal-close" onclick="S.modal=null;render()">×</button>
        </div>
        ${isPdf
                    ? `<iframe src="${esc(src)}" style="width:100%;height:500px;border:none;border-radius:var(--r-md)"></iframe>`
                    : `<img src="${esc(src)}" alt="Schedule" style="width:100%;border-radius:var(--r-md);max-height:500px;object-fit:contain">`}
        <div style="margin-top:14px;display:flex;justify-content:flex-end">
            <a href="${esc(src)}" target="_blank" class="btn btn-ghost btn-sm">↗ Open in new tab</a>
        </div>
        </div>
    </div>`;
        }

        function renderLightbox() {
            return `
    <div class="lightbox" onclick="S.modal=null;render()">
        <button class="lightbox-close" onclick="S.modal=null;render()">×</button>
        ${S.lightboxType === 'image'
                    ? `<img src="${esc(S.lightboxSrc)}" onclick="event.stopPropagation()">`
                    : `<video src="${esc(S.lightboxSrc)}" controls autoplay onclick="event.stopPropagation()"></video>`}
    </div>`;
        }

        /* ═══════════════ BOOT ═══════════════ */
        init();
    </script>
</body>

</html>
